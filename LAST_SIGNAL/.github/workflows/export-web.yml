name: Export Web build

# Builds the HTML5 (Web) export on every push and publishes it to GitHub Pages,
# so LAST SIGNAL is playable in the browser straight from the repo.
# (Enable Pages in repo Settings → Pages → Source: GitHub Actions.)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          if [ -d /root/.local/share/godot/export_templates/4.3.stable ]; then
            cp -r /root/.local/share/godot/export_templates/4.3.stable/* ~/.local/share/godot/export_templates/4.3.stable/ || true
          fi

      - name: Materialize image assets (base64 -> PNG)
        run: python3 tools/decode_assets.py

      - name: Generate audio (procedural, not committed)
        run: |
          apt-get update && apt-get install -y python3-numpy
          python3 tools/generate_audio.py

      - name: Import project
        run: godot --headless --import || true

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
          # GitHub Pages expects index.html at the root of the artifact
          ls -la build/web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
